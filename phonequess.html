<body>

<div class="box">
    <h2>бһ‘бһҹбҹ’бһҹбһ“бҹҚбһ‘бһ¶бһҷбһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘</h2>

    <input type="text" id="phone" placeholder="бһ”бһүбҹ’бһ…бһјбһӣбһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘">
    <button onclick="calculate()">бһӮбһҺбһ“бһ¶</button>

    <div class="result-box" id="output"></div>
</div>

<script>
function calculate(){
    let phone = document.getElementById("phone").value.trim();
    

    if(phone === ""){
        alert("бһҹбһјбһҳбһ”бһүбҹ’бһ…бһјбһӣбһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘!");
        return;
    }

    if(!/^\d+$/.test(phone)){
        alert("бһўбһ¶бһ…бһ”бһүбҹ’бһ…бһјбһӣбһ”бһ¶бһ“бһҸбҹӮбһӣбҹҒбһҒ(бһ”бһ¶бһҡбһ¶бҹҶбһ„)бһ”бҹүбһ»бһҺбҹ’бһҺбҹ„бҹҮ!");
        return;
    }

    if(phone.length < 6){
        alert("бһӣбҹҒбһҒбһҸбҹ’бһҡбһјбһңбһҳбһ¶бһ“бһҷбҹүбһ¶бһ„бһҸбһ·бһ… 6 бһҒбҹ’бһ‘бһ„бҹӢ!");
        return;
    }
    if(phone.length > 10){
        aleet("бһ”бһүбҹ’бһ…бһјбһӣбһ”бһ¶бһ“бһҸбҹӮбһӣбҹҒбһҒ 10 бһҒбҹ’бһ‘бһ„бҹӢ!");
        return;
    }

    let last6 = phone.slice(-6);
    let finalNumber = last6 % 80;
    if(finalNumber === 0){
        finalNumber = 80;
    }
    let meanings = {
        1:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҡбһёбһҖбһ…бһҳбҹ’бһҡбһҫбһ“бһӣбҹ’бһўбһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹҗбһҷбһҮбҹҶбһ“бҹҮ",
        2:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһӣбһ¶бһ—бһҳбһ¶бһ“бһ”бһ„бҹӢбһҳбһ·бһ“бһ‘бһ‘бһҪбһӣбһ•бһӣбһўбҹ’бһңбһёбһ‘бҹҒ",
        3:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһ—бһ¶бһ–бһҡбһёбһҖбһ…бһҳбҹ’бһҡбһҫбһ“бһўбҹ’бһңбһёбҹ—бһўбһ¶бһ…бһҹбһҳбҹ’бһҡбҹҒбһ…бһ”бһ¶бһ“бһҠбһјбһ…бһ”бҹҶбһҺбһ„",
        4:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ•бҹ’бһӣбһјбһңбһўбһ“бһ¶бһүбһҡбһҳбһ¶бһ“бһ§бһ”бһҹбһӮбҹ’бһӮбһ…бҹ’бһҡбһҫбһ“бһӣбҹҶбһ”бһ¶бһҖбһңбҹҒбһ‘бһ“бһ¶",
        5:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҡбһҖбһҹбҹҠбһёбһҳбһ¶бһ“бһ”бһ¶бһ“бһ‘бһ‘бһјбһӣбһ”бһ¶бһ“бһ‘бһ¶бҹҶбһ„бһҖбһ·бһҸбҹ’бһҸбһ·бһҷбһҹбһ‘бһ¶бҹҶбһ„бһ•бһӣбһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚ",
        6:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһ…бҹ’бһҡбһҫбһ“бһўбһ¶бһ…бһ‘бһ‘бһјбһӣбһ”бһ¶бһ“бһӮбһ»бһҺбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһ’бҹҶ",
        7:"бһӣбҹ’бһў = бһҳбһ¶бһ“бһ…бһ·бһҸбҹ’бһҸбһўбһҸбҹӢбһ’бҹ’бһҳбһҸбҹӢбһ–бһ·бһҸбһҮбһ¶бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһҠбҹҸбһ’бҹҶ",
        8:"бһӣбҹ’бһў = бһўбһ¶бһ…бһҳбһ¶бһ“бһӘбһҖбһ¶бһҹбһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷ",
        9:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҜбһҖбһҖбҹ„ бһӮбҹ’бһҳбһ¶бһ“бһўбҹ’бһ“бһҖбһҮбһҪбһҷбһ–бһ·бһ”бһ¶бһҖбһ‘бһ‘бһҪбһӣбһ‘бҹ’бһҡбһ–бҹ’бһҷбһҳбһҖбһңбһ·бһү",
        10:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ…бһ¶бһҸбһ”бһ„бҹӢбһ‘бһ№бһҖбһ…бһ·бһҸбҹ’бһҸбһ“бһ·бһ„бһҖбһҳбҹ’бһӣбһ¶бҹҶбһ„бһ‘бһ‘бҹҒ бһҒбһ·бһҸбһҒбҹҶбһҠбҹ„бһҷбһҘбһҸбһ”бһ¶бһ“бһ•бһӣ",
        11:"бһӣбҹ’бһўвҖӢ =вҖӢвҖӢ бһҳбһ¶бһ“бһӣбҹҶбһ“бһ№бһ„бһӣбҹ’бһўбһўбҹ’бһ“бһҖбһҠбһ‘бҹӮбһҹбҹ’бһүбһҫбһ…бһҹбһҹбһҫбһҡ",
        12:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ‘бһ“бҹӢбһҒбҹ’бһҹбҹ„бһҷбһ’бҹ’бһңбһҫбһўбҹ’бһңбһёбһҖбҹҗбһҳбһ·бһ“бһ”бһ¶бһ“бһҹбһҳбҹ’бһҡбҹҒбһ…бһҠбҹӮбһҡ",
        13:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ =вҖӢ бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһҳбһ¶бһ“бһҖбҹ’бһҸбһёбһҹбһ„бҹ’бһғбһ№бһҳбһ…бҹ’бһҡбһҫбһ“",
        14:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҮбҹҗбһҷбһҮбҹҶбһ“бҹҮ бһ«бһ”бһҡбһҮбҹҗбһҷбһ–бһ№бһ„бһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһҖбһ¶бһҡбһҸбһ¶бҹҶбһ„бһ…бһ·бһҸбҹ’бһҸбһҡбһ”бһҹбҹӢбһҒбҹ’бһӣбһјбһ“",
        15:"бһӣбҹ’бһў =вҖӢ бһҮбҹҗбһҷбһҮбҹҶбһ“бҹҮбһ…бҹ’бһҡбһҫбһ“бһҳбһ¶бһ“бһҖбһ¶бһҡбһҡбһёбһҖбһ…бһҳбҹ’бһҡбһҫбһ“",
        16:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһўбһ¶бһ…бһҹбһҳбҹ’бһҡбҹҒбһ…бһҖбһ·бһ…бҹ’бһ…бһҖбһ¶бһҡбһ’бҹҶбһ”бһ¶бһ“бһ‘бһ‘бһҪбһӣбһ‘бһ¶бҹҶбһ„бһҖбһ·бһҸбҹ’бһҸбһ·бһҷбһҹбһ‘бһ¶бҹҶбһ„бһ•бһӣбһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚ",
        17:"бһӣбҹ’бһў = бһҳбһ¶бһ“бһўбҹ’бһ“бһҖбһ’бҹҶбһҮбһҪбһҷбһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷ",
        18:"бһӣбҹ’бһў = бһҳбһ¶бһ“бһ—бһ¶бһ–бһҡбһёбһҖбһ…бһҳбҹ’бһҡбһҫбһ“бһ“бһ№бһ бһ”бһ¶бһ“бһҹбһҳбҹ’бһҡбҹҒбһ…бһҠбһјбһ…бһ”бҹҶбһҺбһ„",
        19:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҳбһ¶бһ“бһ‘бҹҶбһ“бһ¶бһҹбҹӢбһ…бҹ’бһҡбһҫбһ“бһҳбһ¶бһ“бһӘбһ”бһҹбһӮбҹ’бһӮбһӮбҹ’бһҡбһ”бҹӢбһҮбҹҶбһ–бһјбһҖ",
        20:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ§бһ”бһҹбһӮбҹ’бһӮбһ…бҹ’бһҡбһҫбһ“бһҲбһәбһ…бҹ’бһҡбһҫбһ“бһ–бһ·бһ”бһ¶бһҖбһ…бһ·бһҸбҹ’бһҸбһ…бҹ’бһҡбһҫбһ“",
        21:"бһӣбҹ’бһў = бһ’бҹ’бһңбһҫбһҖбһ¶бһҡбһӣбҹ’бһўбһ·бһҸбһӣбҹ’бһўбһ“бҹӢбһҳбһ¶бһ“бһ”бҹ’бһҡбһ¶бһҮбҹ’бһүбһ¶",
        22:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһҺбһ¶бһҹбҹӢ = бһҒбһ¶бһҸбһ”бһ„бҹӢбһӣбһ¶бһ—бһ’бҹ’бһңбһҫбһўбҹ’бһңбһёбһҖбҹҸбһҳбһ·бһ“бһ”бһ¶бһ“бһҹбһҳбҹ’бһҡбҹҒбһ…бһҠбһјбһ…бһ”бҹҶбһҺбһ„бһҠбҹӮбһҡ",
        23:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҖбһ·бһҸбҹ’бһҸбһ·бһҷбһҹбһӣбҹ’бһўбһҹбһҳбҹ’бһҡбҹҒбһ…бһҖбһ·бһ…бҹ’бһ…бһҖбһ¶бһҡбһ’бҹҶбһ”бһ¶бһ“",
        24:"бһӣбҹ’бһў = бһ–бһ№бһ„бһ•бҹ’бһўбҹӮбһҖбһӣбһҫбһҹбһҹбһҳбһҸбҹ’бһҸбһ—бһ¶бһ–бһ•бҹ’бһ‘бһ¶бһӣбҹӢбһҒбҹ’бһӣбһјбһ“бһўбһ¶бһ…бһҹбһҳбҹ’бһҡбҹҒбһ…бһҖбһ·бһ…бҹ’бһ…бһҖбһ¶бһҡбһ”бһ¶бһ“",
        25:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһҳбһ¶бһ“бһӮбҹҒбһҮбһҪбһҷ",
        26:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһ§бһ”бһҹбһӮбҹ’бһӮбһ…бҹ’бһҡбһҫбһ“",
        27:"бһӣбҹ’бһў = бһўбһ¶бһ…бһҳбһ¶бһ“бһӣбһ¶бһ—бһҹбҹҶбһҺбһ¶бһ„бһ“бһ·бһ„бһҮбҹҗбһҷбһҮбҹҶбһ“бҹҮ",
        28:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҡбһ¶бһҹбһёбһЎбһҫбһ„бһҒбҹ’бһ–бһҹбҹӢбһҡбһҖбһҹбҹҠбһёбһҳбһ¶бһ“бһ”бһ¶бһ“",
        29:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһ“бһ·бһ„бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ бһҖбһҫбһҸбһҳбһ¶бһ“бһЎбһҫбһ„бһ–бҹ’бһҡбһҳбһӮбҹ’бһ“бһ¶",
        30:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ“бһјбһңбһӣбһ¶бһ—бһҹбҹҶбһҺбһ¶бһ„бһ“бһ·бһ„бһҖбһ·бһҸбҹ’бһҸбһҷбһҹ",
        31:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһҮбҹ„бһӮбһҮбҹҗбһҷ",
        32:"бһӣбҹ’бһў = бһҳбһ¶бһ“бһ”бҹ’бһҡбһ¶бһҮбҹ’бһүбһ¶бһҲбҹ’бһӣбһ¶бһҹбһңбҹғбһҳбһ¶бһ“бһ—бһ¶бһ–бһҡбһёбһҖбһ…бһҳбҹ’бһҡбһҫбһ“бһ…бҹ’бһҡбһҫбһ“",
        33:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһҺбһ¶бһҹбҹӢ = бһҮбһҪбһ”бһ§бһ”бһҹбһӮбҹ’бһӮбһҳбһ·бһ“бһ…бҹҒбҹҮбһўбһҹбҹӢбһ–бһ·бһ”бһ¶бһҖбһ“бһ№бһ„бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷ",
        34:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҸбҹ’бһҡбһјбһңбһҳбһ¶бһ“бһӣбҹҶбһ“бһ№бһ„бһ…бһ·бһҸбҹ’бһҸбһҖбһ»бҹҶбһӣбҹ„бһ—бһӣбһ“бҹӢ",
        35:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ§бһ”бһҹбһӮбҹ’бһӮбһҮбһ…бҹ’бһҡбһҫбһ“бһҸбҹӮбһҮбһјбһ”бһ—бһ¶бһ–бһӣбҹҶбһ”бһ¶бһҖ бһ“бһ·бһ„бһҖбҹ’бһҡбһҒбҹ’бһҹбһҸбҹӢ",
        36:"бһӣбҹ’бһў = бһ§бһ”бһҹбһӮбҹ’бһӮбһўбһ¶бһ…бһҖбҹ’бһӣбһ¶бһҷбһҮбһ¶бһҹбҹҶбһҺбһ¶бһ„бһ’бҹ’бһңбһҫбһўбҹ’бһңбһёбҹ—бһўбһ¶бһ…бһ”бһ¶бһ“бһҠбһјбһ…бһ”бҹҶбһҺбһ„",
        37:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ“бһјбһңбһҖбһ·бһҸбҹ’бһҸбһ·бһҷбһҹбһҸбҹӮбһ–бһ·бһ”бһ¶бһҖбһ‘бһ‘бһҪбһӣбһ“бһјбһңбһӣбһ¶бһ—бһҹбҹҶбһҺбһ¶бһ„",
        38:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһўбһ“бһ¶бһӮбһҸбһ—бҹ’бһӣбһәбһҹбҹ’бһңбһ¶бһ„бһҸбҹ’бһҡбһ…бҹҮбһҸбҹ’бһҡбһ…бһ„бҹӢ",
        39:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһ¬бһ§бһ”бһҹбһӮбҹ’бһӮбһҳбһ¶бһ“бһҳбһ·бһ“бһ‘бҹҖбһ„",
        40:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһўбһ“бһ¶бһӮбһҸбһӣбҹ’бһўбһ бһҫбһҷбһ—бҹ’бһӣбһәбһҹбҹ’бһңбһ¶бһ„ бһҸбҹ’бһҡбһ…бҹҮбһҸбҹ’бһҡбһ…бһ„бҹӢ",
        41:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҖбһ¶бһҡбһҡбһҖбһҹбҹҠбһёбһҸбҹ’бһҡбһјбһңбһҒбһ¶бһҸбһ”бһ„бҹӢ",
        42:"бһӣбҹ’бһў = бһ”бһҫбһҳбһ¶бһ“бһ…бһ·бһҸбҹ’бһҸбһўбһҸбҹӢбһ’бҹ’бһҳбһҸбҹӢбһҹбҹҶбһҺбһ¶бһ„бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ бһўбһ¶бһ…бһҖбҹ’бһӣбһ¶бһҷбһҮбһ¶бһҳбһ¶бһ“бһӣбһ¶бһ—",
        43:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҡбһҝбһ„бһўбҹ’бһңбһёбҹ—бһ–бһ·бһ”бһ¶бһҖбһҹбһҳбҹ’бһҡбҹҒбһ…бһҠбһјбһ…бһ”бҹҶбһҺбһ„бһ”бҹ’бһҡбһ¶бһҗбҹ’бһ“бһ¶",
        44:"бһӣбҹ’бһў = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһҳбһ¶бһ“бһ—бһ¶бһ–бһҡбһёбһҖбһ…бһҳбҹ’бһҡбһҫбһ“",
        45:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҮбһјбһ”бһ§бһ”бһҹбһӮбҹ’бһӮ бһҳбһ·бһ“бһ…бҹҒбҹҮбһўбһҹбҹӢ",
        46:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһӮбҹҒбһҸбһ¶бһҳбһҮбһҪбһҷбһҗбҹӮбһҡбһҖбҹ’бһҹбһ¶ бһўбһ¶бһ…бһ”бҹ’бһҡбһҖбһ”бһҳбһ»бһҒбһҮбҹҶбһ“бһҪбһүбһ”бһ¶бһ“вҖӢ",
        47:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһҳбһ¶бһ“бһ‘бһ¶бҹҶбһ„бһҖбһ·бһҸбҹ’бһҸбһ·бһҷбһҹбһҳбһ¶бһ“бһ‘бһ¶бһ„бһҸбҹ’бһҡбһ–бҹ’бһҷбһҹбһҳбҹ’бһ–бһҸбҹ’бһҸбһ·",
        48:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһ§бһ”бһҹбһӮбҹ’бһӮбһ бһҫбһҷбһҖбҹҸбһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһҠбҹӮбһҡ",
        49:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһ§бһ”бһҹбһӮбҹ’бһӮбһ бһҫбһҷбһҖбҹҸбһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһҠбҹӮбһҡ",
        50:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһӣбһ¶бһ—бһҹбҹҶбһҺбһ¶бһ„бһ“бһ·бһ„бһ§бһ”бһҹбһӮбҹ’бһӮбһҖбһәбһҳбһҖбһҳбһ·бһ“бһ‘бҹҖбһ„",
        51:"бһӣбҹ’бһў = бһҒбһ·бһҸбһҒбҹҶбһ“бһ·бһ„бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷ",
        52:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ–бҹҒбһӣбһ”бһ¶бһ“бһӣбһ¶бһ—бһҹбҹҶбһҺбһ¶бһ„бһ“бһ·бһ„бһҳбһ¶бһ“бһ§бһ”бһҹбһӮбҹ’бһӮбһҸбһ¶бһҳбһҳбһҖбһ–бһёбһҖбҹ’бһҡбҹ„бһҷ",
        53:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҒбһ·бһҸбһҒбҹҶбһ”бҹ’бһҡбһ№бһ„бһ”бҹ’бһҡбҹӮбһ„бһҒбҹ’бһӣбһ¶бҹҶбһ„бһҸбҹӮбһ‘бһ‘бһјбһӣбһ”бһ¶бһ“бһӣбһ‘бҹ’бһ’бһ•бһӣбһҸбһ·бһ…бһҸбһҪбһ…",
        54:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһӣбҹ’бһўбһҸбҹӮбһҹбҹҶбһ”бһҖбһҖбҹ’бһҡбҹ…бһҸбҹӮбһҸбһ¶бһҳбһҖбһ¶бһҡбһ–бһ·бһҸбһҳбһ¶бһ“бһ§бһ”бһҹбһӮбҹ’бһӮ бһ“бһ·бһ„бһӮбҹ„бҹҮбһҗбҹ’бһ“бһ¶бһҖбҹӢ",
        55:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһҺбһ¶бһҹбҹӢ = бһҮбһҪбһ”бһ§бһ”бһҹбһӮбҹ’бһӮ бһҳбһ·бһ“бһ…бҹҒбҹҮбһўбһҹбҹӢбһўбһ¶бһ…бһҳбһ¶бһ“бһӮбҹ’бһҡбҹ„бҹҮбһҗбҹ’бһ“бһ¶бһҖбҹӢ",
        56:"бһӣбҹ’бһў = бһҒбһ·бһҸбһҒбҹҶбһ”бҹ’бһҡбһ№бһ„бһ”бҹ’бһҡбҹӮбһ„бһўбһ¶бһ…бһҖбҹӮбһ”бҹ’бһҡбҹӮбһ“бһјбһңбһҮбҹ„бһӮбһңбһ¶бһҹбһ“бһ¶",
        57:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһ§бһ”бһҹбһӮбҹ’бһӮбһ…бҹ’бһҡбһҫбһ“вҖӢ бһҸбҹӮбһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһ“бһәбһ„бһҳбһ¶бһ“бһ–бһёбһҖбҹ’бһҡбҹ„бһҷ",
        58:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ–бҹҒбһӣбһҮбһҪбһ”бһ“бһ·бһ„бһ”бһүбҹ’бһ бһ¶бһ…бһ·бһҸбҹ’бһҸбһҳбһ·бһҸбҹ’бһҸбһ“бһ№бһ„бһ“бһҡбһ–бһ·бһ”бһ¶бһҖбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸ",
        59:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһ…бһ·бһҸбҹ’бһҸбһ…бҹ’бһҡбһ”бһјбһҖбһ…бҹ’бһҡбһ”бһӣбҹӢбһ–бһ·бһ”бһ¶бһҖбһҹбһҳбҹ’бһҡбҹҒбһ…бһ…бһ·бһҸбҹ’бһҸ",
        60:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҮбһјбһ”бһ§бһ”бһҹбһӮбҹ’бһӮбһ…бҹ’бһҡбһҫбһ“",
        61:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҳбһ¶бһ“бһҡбһҝбһ„бһҹбҹ’бһҳбһ»бһӮбһҹбҹ’бһҳбһ¶бһүбһ…бҹ’бһҡбһҫбһ“бһ–бһ·бһ”бһ¶бһҖбһҹбһҳбҹ’бһҡбҹҒбһ…бһўбҹ’бһңбһёбҹ—бһҠбҹӮбһӣбһ”бһ¶бһ“бһ”бҹүбһ„бһ‘бһ»бһҖ",
        62:"бһӣбҹ’бһў = бһҒбһ·бһҸбһҒбҹҶбһ“бһ·бһ„бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ“бһҪбһңбһ•бһӣбһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚ",
        63:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҒбҹҒбһ„бһҒбҹҶ бһҸбҹӮбһӮбҹ’бһҳбһ¶бһ“бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһ•бһӣбһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚбһўбҹ’бһңбһёбһ‘бҹ’бһ”бһҫбһҷ",
        64:"бһӣбҹ’бһў  = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„",
        65:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһӣбҹ’бһў бһҸбҹӮбһҒбҹ’бһңбҹҮбһ‘бҹҶбһ“бһ»бһҖбһ…бһ·бһҸбҹ’бһҸбһӣбһҫбһҒбҹ’бһӣбһҪбһ“бһҜбһ„",
        66:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһ’бҹ’бһңбһҫбһўбҹ’бһңбһёбҹ—бһҸбҹӮбһ„бһ”бһ¶бһ“бһҹбһҳбҹ’бһҡбҹҒбһ…бһҳбһ¶бһҹбһ”бҹ’бһҡбһ¶бһҖбҹӢбһ бһјбһҡбһ…бһјбһӣбһ…бҹ’бһҡбһҫбһ“",
        67:"бһӣбҹ’бһў = бһ”бҹ’бһҡбһҹбһ·бһ“бһ”бһҫбһўбһ¶бһ…бһҖбҹ’бһҸбһ¶бһ”бҹӢбһҮбһ¶бһ”бҹӢбһ“бһјбһңбһ§бһҖбһ¶бһҹбһӣбҹ’бһўбһ’бһ¶бһ…бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҶбһ“бһў",
        68:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҹбҹ’бһҗбһ¶бһ“бһ—бһ¶бһ–бһҳбһ·бһ“бһ“бһ№бһ„бһ“бһҡбһўбһ¶бһ…бһ…бһ¶бһүбҹӢбһ”бҹ„бһҖбһӮбҹҒбһҮбһҪбһ”бһ§бһ”бһҹбһӮбҹ’бһӮбһ…бҹ’бһҡбһҫбһ“",
        69:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҡбһҖбһҹбҹҠбһёбһҒбһ¶бһҸбһ”бһ„бҹӢбһҮбһҪбһ”бһ—бһ¶бһ–бһ…бҹ’бһҡбһ”бһјбһҖбһ…бҹ’бһҡбһ”бһӣбҹӢбһ“бһ·бһ„бһ§бһ”бһҹбһӮбҹ’бһӮ",
        70:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһ¬бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһўбһ¶бһҹбҹ’бһҡбҹҗбһҷбһӣбһҫбһ—бһ¶бһ–бһҖбҹ’бһӣбһ¶бһ бһ¶бһ“",
        71:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһ”бһ¶бһ“бһ бһҫбһҷбһҸбҹӮбһҖбҹ’бһҡбҹӮбһҮбһ¶бһ”бһ¶бһҸбҹӢбһ”бһ„бҹӢбһ‘бҹ…бһңбһ·бһүбһ–бһ·бһ”бһ¶бһҖбһҹбһҳбҹ’бһҡбҹҒбһ…бһҸбһ¶бһҳбһ”бҹҶбһҺбһ„бһҺбһ¶бһҹбҹӢ",
        72:"бһӣбҹ’бһў = бһҳбһ¶бһ“бһҹбһ»бһ—бһҳбһ„бҹ’бһӮбһӣ",
        73:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһ”бһҫбһҹбһ·бһ“бһҮбһ¶бһҡбһ»бһүбһҡбһ¶бһ–бһ·бһ”бһ¶бһ“бһ“бһ№бһ„бһ‘бһ‘бһҪбһӣбһҮбҹ„бһӮбһҮбҹҗбһҷбһҺбһ¶бһҹбҹӢ",
        74:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢбһҖбҹҸбһҳбһ¶бһ“бһҹбҹҶбһҺбһ¶бһ„бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢбһҠбҹӮбһҡ",
        75:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢ = бһҖбһ¶бһҡбһ„бһ¶бһҡбһҡбһҖбһҹбҹҠбһёбһҒбһ¶бһҸбһ”бһ„бҹӢбҹӢбһӘбһҖбһ¶бһҹ бһўбһҹбҹӢбһ‘бҹ’бһҡбһ–бҹ’бһҷбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·",
        76:"бһӣбҹ’бһў = бһ–бһ·бһ”бһ¶бһҖбһҳбһ»бһ“бһҹбҹ’бһҡбһҺбһ»бһҖбһҖбҹ’бһҡбҹ„бһҷ",
        77:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһҳбһ¶бһ“бһӣбһ¶бһ—бһҳбһ¶бһ“бһ”бһ„бҹӢбһҳбһ·бһ“бһўбһ¶бһ…бһҹбҹ’бһҸбһ»бһҖбһҹбҹ’бһҸбһҳбҹ’бһ—",
        78:"бһ’бһҳбҹ’бһҳбһҸбһ¶ = бһўбһ¶бһ“бһ¶бһӮбһҸбһҳбһ·бһ“бһҹбһјбһңбһ—бҹ’бһӣбһәбһҹбҹ’бһңбһ¶бһ„бһ‘бҹҒбһ бһҫбһҷбһҖбҹҸбһҳбһ·бһ“бһҹбһјбһңбһҳбһ¶бһ“бһ‘бҹ’бһҡбһ–бҹ’бһҷбһҹбһҳбҹ’бһ”бһҸбҹ’бһҸбһ·бһҠбҹӮбһҡ",
        79:"бһўбһ¶бһҖбҹ’бһҡбһҖбҹӢвҖӢ = бһ”бһ¶бһ“бһ бһҫбһҷбһҸбҹӮбһ”бҹ’бһҡбҹӮбһҒбһ¶бһҸбһ”бһ„бҹӢбһ‘бҹ…бһңбһ·бһүбһҒбһ·бһҸбһҒбҹҶбһҘбһҸбһ”бҹ’бһҡбһҷбҹ„бһҮбһ“бҹҚ",
        80:"бһӣбҹ’бһўбһҺбһ¶бһҹбҹӢ = бһўбһ¶бһ…бһ‘бһ‘бһҪбһӣбһ”бһ¶бһ“бһҮбҹ„бһӮбһҮбҹҗбһҷбһ…бҹ’бһҡбһҫбһ“"
    };

    let resultText = meanings[finalNumber] || "бһҹбһјбһҳбһҳбһҫбһӣбһҸбһ¶бһҡбһ¶бһ„бһӣбһ‘бҹ’бһ’бһ•бһӣбһӣбҹҒбһҒ " + finalNumber;

    document.getElementById("output").innerHTML = `
        <table>
            <tr>
                <th>бһ–бҹҗбһҸбҹҢбһҳбһ¶бһ“</th>
                <th>бһӣбһ‘бҹ’бһ’бһ•бһӣ</th>
            </tr>
            <tr>
                <td>бһӣбҹҒбһҒбһ‘бһјбһҡбһҹбҹҗбһ–бҹ’бһ‘</td>
                <td>${phone}</td>
            </tr>
            <tr>
                <td>бһӣбҹҒбһҒ 6 бһҒбҹ’бһ‘бһ„бҹӢбһ…бһ»бһ„бһҖбҹ’бһҡбҹ„бһҷ</td>
                <td>${last6}</td>
            </tr>
            <tr>
                <td>бһӣбҹҒбһҒбһҹбҹҶбһҺбһ¶бһ„</td>
                <td><b>${finalNumber}</b></td>
            </tr>
            <tr>
                <td>бһҖбһ¶бһҡбһ–бһ“бҹ’бһҷбһӣбҹӢ</td>
                <td>${resultText}</td>
            </tr>
        </table>
        
    `;
}
</script>
